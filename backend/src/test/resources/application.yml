spring:
  application:
    name: real-estate-crm

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # with H2 in-memory database, we can create and drop the schema for each test run
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false            # don't use Flyway in tests, Hibernate will create the schema from entities

  mail:
    username: test
    password: test

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: test-secret-key-for-ci-tests-only-not-used-in-production-1234567890
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

app:
  base-url: http://localhost:8080
  mail:
    enabled: false