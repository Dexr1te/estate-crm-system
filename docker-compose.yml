version: '3.8'

services:

  # ===== PostgreSQL =====
  db:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mydhuua
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d crm_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Spring Boot App =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/crm_db
      DB_USERNAME: postgres
      DB_PASSWORD: mydhuua
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-256bit}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-your-project-id}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

  # ===== pgAdmin (для разработки, UI для БД) =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crm_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crm.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev       # Запускается только через: docker-compose --profile dev up

volumes:
  postgres_data: