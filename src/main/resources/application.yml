spring:
  application:
    name: real-estate-crm

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/crm_db}
    username: ${POSTGRES_USER:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-chars}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:dummy}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

logging:
  level:
    com.crm: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO